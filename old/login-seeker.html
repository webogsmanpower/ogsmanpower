<!DOCTYPE html>
<html>
<head>
    <title>Login Seeker</title>
</head>
<body>
    <h1>Login Seeker User</h1>
    <button onclick="login()">Login as seeker@test.com</button>
    <div id="result"></div>
    
    <script>
        async function login() {
            const result = document.getElementById('result');
            result.innerHTML = '<p>Logging in...</p>';
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        email: 'shafqatkhattak01@gmail.com',
                        password: 'password'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.token) {
                    localStorage.setItem('ogs_token', data.token);
                    localStorage.setItem('ogs_refresh_token', data.refresh_token || '');
                    result.innerHTML = `
                        <p>Login successful!</p>
                        <p>Token: ${data.token.substring(0, 50)}...</p>
                        <p>User: ${JSON.stringify(data.user, null, 2)}</p>
                        <button onclick="goToEditResume()">Go to Edit Resume</button>
                    `;
                } else {
                    result.innerHTML = `<p>Login failed: ${JSON.stringify(data)}</p>`;
                }
            } catch (error) {
                result.innerHTML = `<p>Error: ${error.message}</p>`;
            }
        }
        
        function goToEditResume() {
            window.location.href = '/seeker/edit-resume';
        }
    </script>
</body>
</html>
