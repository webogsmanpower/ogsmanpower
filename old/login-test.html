<!DOCTYPE html>
<html>
<head>
    <title>Login Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; }
        input { width: 300px; padding: 8px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        .result { margin-top: 20px; padding: 10px; background: #f5f5f5; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <h1>Login Test</h1>
    <form id="loginForm">
        <div class="form-group">
            <label>Email:</label>
            <input type="email" id="email" value="test@example.com" required>
        </div>
        <div class="form-group">
            <label>Password:</label>
            <input type="password" id="password" value="password" required>
        </div>
        <button type="submit">Login</button>
    </form>
    
    <div id="result" class="result"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                resultDiv.innerHTML = '<p>Logging in...</p>';
                
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    localStorage.setItem('ogs_token', data.token);
                    if (data.refresh_token) {
                        localStorage.setItem('ogs_refresh_token', data.refresh_token);
                    }
                    
                    resultDiv.innerHTML = `
                        <p class="success">Login successful!</p>
                        <p>Token: ${data.token.substring(0, 50)}...</p>
                        <button onclick="testUserAPI()">Test User API</button>
                    `;
                } else {
                    resultDiv.innerHTML = `<p class="error">Login failed: ${data.message}</p>`;
                }
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        });
        
        async function testUserAPI() {
            const resultDiv = document.getElementById('result');
            const token = localStorage.getItem('ogs_token');
            
            if (!token) {
                resultDiv.innerHTML = '<p class="error">No token found</p>';
                return;
            }
            
            try {
                const response = await fetch('/api/user', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    }
                });
                
                const data = await response.json();
                
                resultDiv.innerHTML = `
                    <h3>User API Response:</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                    <p>Status: ${response.status}</p>
                `;
            } catch (error) {
                resultDiv.innerHTML = `<p class="error">Error: ${error.message}</p>`;
            }
        }
        
        // Check if already logged in
        window.addEventListener('load', () => {
            const token = localStorage.getItem('ogs_token');
            if (token) {
                document.getElementById('result').innerHTML = `
                    <p class="success">Already logged in</p>
                    <button onclick="testUserAPI()">Test User API</button>
                `;
            }
        });
    </script>
</body>
</html>
